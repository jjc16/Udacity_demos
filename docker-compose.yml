services:
  chroma-server:
    image: chromadb/chroma:latest
    container_name: chroma-db
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      # This ensures your hotel data survives if the container restarts
      - ./chroma_data:/chroma/chroma
    restart: unless-stopped
